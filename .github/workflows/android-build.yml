name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Garantisce la presenza di zipalign e build-tools
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    - name: Build Release APK
      run: |
        gradle assembleRelease

    - name: Sign APK Manual
      run: |
        # 1. Crea la cartella per il keystore e decodifica il secret
        mkdir -p certs
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > certs/release.jks
        
        # 2. Trova i tool necessari
        APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
        ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -r | head -n 1)
        
        # 3. Trova l'APK generato (ignora quelli già allineati o firmati)
        # Questo comando cerca qualsiasi file .apk nella cartella release
        RAW_APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*-aligned.apk" ! -name "*-final.apk" | head -n 1)
        
        echo "Trovato APK da firmare: $RAW_APK"

        # 4. Allinea l'APK
        $ZIPALIGN -v 4 "$RAW_APK" app/build/outputs/apk/release/app-release-aligned.apk
        
        # 5. Firma l'APK
        $APKSIGNER sign --ks certs/release.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-final.apk \
          app/build/outputs/apk/release/app-release-aligned.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: aggiorna-rubrica-firmato
        path: app/build/outputs/apk/release/app-release-final.apk

    - name: Upload Build Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-reports
        path: app/build/reports/